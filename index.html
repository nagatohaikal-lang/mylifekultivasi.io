<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MYSISTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Chart.js Injected for Advanced Analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --void:#08080F;
  --void-2:#0F1020;
  --surface:rgba(255,255,255,0.035);
  --surface-strong:rgba(255,255,255,0.07);
  --border:rgba(150,135,255,0.16);
  --border-strong:rgba(170,155,255,0.30);
  --glass:rgba(18,18,34,0.62);
  --arise:#7C5CFF;
  --arise-bright:#A48BFF;
  --cyan:#2DD4F4;
  --gold:#F0B93B;
  --gold-soft:#F7D27A;
  --jade:#34D399;
  --crimson:#FF4768;
  --orange:#FF8A3D;
  --bone:#ECEAF5;
  --muted:#9492AC;
  --muted-2:#615F78;
  --font-display:'Cinzel',serif;
  --font-system:'Rajdhani',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-head:'Cinzel',serif;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(circle at 50% 30%, #1a1025 0%, #08080F 50%, #030305 100%);
  color:var(--bone);
  font-family:var(--font-body);
  overflow-x:hidden;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background: radial-gradient(circle at 15% 70%, rgba(45,212,244,0.04) 0%, transparent 50%),
              radial-gradient(circle at 85% 20%, rgba(124,92,255,0.04) 0%, transparent 50%);
}

button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
::selection{background:var(--arise);color:#fff;}
a{color:var(--cyan);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

.holo-text {
    background: linear-gradient(90deg, var(--cyan), var(--arise-bright), var(--jade), var(--cyan));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: holoFlow 4s linear infinite;
    font-weight: 800;
    text-shadow: 0 0 15px rgba(45, 212, 244, 0.4);
}
@keyframes holoFlow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

#bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

.click-ripple {
    position: fixed; border-radius: 50%; pointer-events: none;
    background: rgba(45, 212, 244, 0.4); transform: translate(-50%, -50%) scale(0);
    animation: rippleAnim 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; z-index: 9999;
    box-shadow: 0 0 15px var(--cyan);
}
@keyframes rippleAnim { 100% { transform: translate(-50%, -50%) scale(4); opacity: 0; } }

.screen{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

.app-header{
  position:sticky;top:0;z-index:20; padding:14px 16px 10px;
  background:linear-gradient(to bottom, rgba(8,8,15,0.96), rgba(8,8,15,0.7));
  backdrop-filter:blur(14px); border-bottom:1px solid var(--border);
}
.wordmark-row{display:flex;align-items:center;justify-content:space-between;}
.wordmark{ font-family:var(--font-display); font-size:18px;letter-spacing:2px;font-weight:800; }

.day-counter {
  font-family: var(--font-display); font-size: 14px;
  background: linear-gradient(90deg, var(--gold-soft), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  filter: drop-shadow(0 0 4px rgba(240, 185, 59, 0.4));
  display: flex; align-items: center; gap: 4px;
}

.recovery-banner{
  margin-top:8px;font-size:12px;font-weight:600;color:#fff;
  background:linear-gradient(90deg,rgba(255,71,104,0.35),rgba(255,71,104,0.12));
  border:1px solid rgba(255,71,104,0.5);
  border-radius:10px;padding:8px 10px;letter-spacing:0.3px;
}
.recovery-banner small{display:block;font-weight:400;color:#ffd9df;margin-top:2px;font-size:11px;}

.tab-content{flex:1;padding:16px 16px 110px;animation:tabIn 0.28s ease;}
@keyframes tabIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30; max-width:480px;margin:0 auto; display:flex;
  background:var(--glass); backdrop-filter:blur(20px); border-top:1px solid var(--border);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  overflow-x:auto; scroll-behavior:smooth; -ms-overflow-style:none;scrollbar-width:none;
}
.bottom-nav::-webkit-scrollbar{display:none;}
.nav-btn{
  flex:1; min-width: 62px; display:flex;flex-direction:column;align-items:center;gap:3px; flex-shrink: 0;
  background:none;border:none;color:var(--muted);padding:8px 0 4px;border-radius:12px;
  font-family:var(--font-system);font-size:9.5px;letter-spacing:0.3px;font-weight:600; transition:color .2s;
}
.nav-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:filter .2s;}
.nav-btn.active{color:var(--arise-bright);}
.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(164,139,255,0.7));}

.holo-box {
  background: rgba(255,255,255,0.02) !important;
  border: 1px solid rgba(45, 212, 244, 0.2) !important;
  box-shadow: inset 0 0 15px rgba(124, 92, 255, 0.05), 0 5px 20px rgba(0,0,0,0.5) !important;
  backdrop-filter: blur(12px) !important;
}

.glass-panel{
  background:var(--glass); border:1px solid var(--border); border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
}
.card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:14px; }
.card-title{ font-family:var(--font-system);font-size:12.5px;letter-spacing:1.2px;font-weight:700; color:var(--muted);text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between; }
.section-title{ font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--bone); margin:22px 0 10px;letter-spacing:0.4px; }
.section-title:first-child{margin-top:0;}

.btn{ font-family:var(--font-system);font-weight:700;letter-spacing:0.5px;font-size:13px; border-radius:12px;padding:10px 14px;border:1px solid transparent; display:inline-flex;align-items:center;justify-content:center;gap:6px; transition:transform .12s, opacity .12s; }
.btn-secondary { background:rgba(255,255,255,0.05); color:var(--bone); border:1px solid var(--border); }
.btn-secondary:hover { background:rgba(255,255,255,0.1); }
.btn:active{transform:scale(0.96);}
.btn-block{width:100%;}
.btn-primary{background:linear-gradient(90deg,var(--arise),var(--cyan));color:#0a0a14;}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border-strong);color:var(--bone);}
.btn-ghost:hover{background:rgba(255,255,255,0.08);}
.btn-danger{background:rgba(255,71,104,0.1);border:1px solid rgba(255,71,104,0.45);color:#ffb4c1;}
.btn-gold{background:linear-gradient(90deg,var(--gold),var(--orange));color:#1a1206;}
.btn-sm{padding:7px 10px;font-size:11.5px;border-radius:9px;}
.btn[disabled]{opacity:0.35;pointer-events:none;}

.icon-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:6px; display:inline-flex; align-items:center; justify-content:center; border-radius:8px; transition:all 0.2s ease; }
.icon-btn:hover { background:rgba(255,255,255,0.1); color:var(--bone); }
.icon-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

.pill{ font-family:var(--font-system);font-size:10px;font-weight:700;letter-spacing:0.6px; padding:3px 8px;border-radius:20px;display:inline-block;text-transform:uppercase; }
.row{display:flex;align-items:center;}
.row-between{display:flex;align-items:center;justify-content:space-between;}
.gap-6{gap:6px;} .gap-8{gap:8px;} .gap-10{gap:10px;}
.muted{color:var(--muted);} .small{font-size:11.5px;}
.mt-10{margin-top:10px;} .mt-14{margin-top:14px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:0.5px; text-transform:uppercase;}
.field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea,
.input, .shift-select, .realm-row input[type=text], .realm-row input[type=number], .num-input-sm {
  width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:12px;
  padding:12px 14px;color:#fff;font-size:14px;outline:none; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
  color-scheme: dark;
}
.field input:focus,.field select:focus,.field textarea:focus,
.input:focus, .shift-select:focus, .realm-row input:focus, .num-input-sm:focus { border-color:var(--cyan); box-shadow: 0 0 0 3px rgba(45,212,244,0.2), inset 0 2px 5px rgba(0,0,0,0.5); }
.field textarea{resize:vertical;min-height:70px;}

.form-row { display:flex; gap:10px; }
.form-group { margin-bottom: 13px; }
.form-group.half { flex:1; }
.form-group label { display:block; font-size:11.5px; color:var(--muted); margin-bottom:5px; font-weight:600; letter-spacing:0.3px; }

.stat-row{margin-bottom:12px;}
.stat-row-top{display:flex;justify-content:space-between;font-family:var(--font-system);font-size:12.5px;margin-bottom:5px;}
.stat-name{color:var(--bone);font-weight:600;letter-spacing:0.3px;}
.stat-val{color:var(--muted);font-weight:700;}
.stat-track{height:7px;border-radius:6px;background:rgba(255,255,255,0.06);overflow:hidden;}
.stat-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.stat-group-label{font-family:var(--font-system);font-size:10.5px;color:var(--muted-2);letter-spacing:1.4px;text-transform:uppercase;margin:14px 0 8px;}

.ring-wrap{position:relative;width:168px;height:168px;margin:6px auto 4px;}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,0.07);stroke-width:9;}
.ring-fill{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(.2,.8,.2,1);}
.ring-orbit{ position:absolute;inset:8px;border-radius:50%; border:1px dashed rgba(164,139,255,0.35); animation:orbitSpin 14s linear infinite; }
@keyframes orbitSpin{to{transform:rotate(360deg);}}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-level-label{font-family:var(--font-system);font-size:10px;color:var(--muted);letter-spacing:1.5px;}

.title-banner {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 5;
    animation: floatBanner 3.5s ease-in-out infinite;
    text-align: center;
    transition: all 0.3s ease;
}
@keyframes floatBanner { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

.realm-name{font-family:var(--font-display);text-align:center;font-size:16px;font-weight:600;letter-spacing:0.6px;margin-top:6px;}
.spiritual-bar-wrap{margin-top:14px;}
.spiritual-track{height:6px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;}
.spiritual-fill{
  height:100%;border-radius:5px;
  background: linear-gradient(90deg, #34D399, #2DD4F4, #A48BFF, #34D399);
  background-size: 200% 200%;
  animation: holoFlow 3s ease infinite;
  transition:width .5s ease;
}

.life-score-row{display:flex;justify-content:space-around;text-align:center;margin-top:14px;}
.life-score-item .num{font-family:var(--font-system);font-size:18px;font-weight:700;}
.life-score-item .lbl{font-size:10px;color:var(--muted);letter-spacing:0.6px;text-transform:uppercase;margin-top:2px;}

.quest-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.quest-filters::-webkit-scrollbar{display:none;}
.chip{ flex:0 0 auto;font-family:var(--font-system);font-size:11.5px;font-weight:700;letter-spacing:0.4px; padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap; cursor:pointer;}
.chip.active{background:var(--arise);color:#fff;border-color:var(--arise);}

.quest-card{ position:relative;border-radius:14px;padding:12px 12px 12px 16px;margin-bottom:10px; background:var(--surface);border:1px solid var(--border);overflow:hidden; }
.quest-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.quest-card.t-daily::before{background:var(--arise);}
.quest-card.t-weekly::before{background:var(--cyan);}
.quest-card.t-monthly::before{background:var(--jade);}
.quest-card.t-special::before{background:var(--orange);}
.quest-card.t-legendary::before{background:linear-gradient(180deg,var(--gold),var(--orange));}
.quest-card.t-custom::before{background:var(--muted-2);}
.quest-card.status-done{opacity:0.55;}
.quest-card.is-legendary{background:linear-gradient(110deg, rgba(240,185,59,0.07), rgba(124,92,255,0.05) 60%);}
.quest-title-row{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
.quest-title{font-family:var(--font-body);font-weight:600;font-size:14px;line-height:1.3;}
.quest-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center;}
.quest-reward{font-family:var(--font-system);font-size:11px;color:var(--gold-soft);font-weight:700;white-space:nowrap;}
.quest-stats{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.stat-chip{font-size:9.5px;color:var(--muted);background:rgba(255,255,255,0.05);border-radius:8px;padding:2px 7px;letter-spacing:0.3px;}
.quest-actions{display:flex;gap:6px;margin-top:10px;}
.quest-notes{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.4;}
.quest-core-tag{font-size:9px;color:var(--jade);letter-spacing:0.5px;font-weight:700;}

.ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.ach-item{border-radius:12px;padding:10px;text-align:center;border:1px solid var(--border);background:var(--surface); transition: transform 0.3s, box-shadow 0.3s;}
.ach-item.unlocked{background: linear-gradient(145deg, rgba(45,212,244,0.1), transparent); border-color: var(--cyan); box-shadow: inset 0 0 10px rgba(45,212,244,0.1);}
.ach-icon{font-family:var(--font-display);font-size:24px;margin-bottom:4px; filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));}
.ach-label{font-size:11px;font-weight:600;line-height:1.3;}

.title-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface);margin-bottom:8px; cursor:pointer;}
.title-item.equipped{border-color:var(--arise-bright);background:rgba(124,92,255,0.08);}
.title-item.locked{opacity:0.4;}
.title-name{font-size:13.5px;font-weight:600;}
.title-hint{font-size:10px;color:var(--muted);margin-top:2px;}

.goal-card { transition: transform 0.3s, box-shadow 0.3s; position: relative; overflow: hidden; }
.goal-card.status-done::after { content:''; position:absolute; inset:0; background:rgba(52,211,153,0.05); pointer-events:none; }

.boss-card{text-align:center;padding:20px 14px;}
.boss-name{font-family:var(--font-display);font-size:17px;margin-bottom:14px;}
.boss-hp-track{height:20px;border-radius:10px;background:rgba(255,255,255,0.06);overflow:hidden;border:1px solid rgba(255,71,104,0.3);position:relative;}
.boss-hp-fill{height:100%;background:linear-gradient(90deg,#7a0e22,var(--crimson));transition:width .6s ease;}
.boss-hp-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-system);font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.6);}
.log-item{display:flex;justify-content:space-between;font-size:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.log-amount{color:var(--jade);font-weight:700;font-family:var(--font-system);}

.spirit-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:8px;}
.spirit-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center;color:var(--bone);font-size:12px;font-weight:600; display:flex; flex-direction:column; justify-content:space-between; min-height:80px; position:relative;}
.spirit-btn small{display:block;color:var(--muted);font-size:9.5px;margin-top:2px;font-weight:400;}

.shift-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;}
.shift-opt{flex:1;text-align:center;padding:9px 0;border-radius:9px;font-family:var(--font-system);font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;}
.shift-opt.active{background:var(--arise);color:#fff;}

.realm-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.realm-row:last-child{border-bottom:none;}

#modal-root{position:fixed;inset:0;z-index:50;pointer-events:none;}
.modal-overlay{ position:absolute;inset:0;background:rgba(4,4,10,0.72);backdrop-filter:blur(3px); opacity:0;visibility:hidden;transition:opacity .2s;pointer-events:none; }
.modal-overlay.open{opacity:1;visibility:visible;pointer-events:auto;}
.modal-sheet{ position:absolute;left:0;right:0;bottom:0;max-width:480px;margin:0 auto; background:#13131F;border:1px solid var(--border-strong);border-radius:22px 22px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1); max-height:86vh;overflow-y:auto; }
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--muted-2);border-radius:3px;margin:0 auto 14px;}
.modal-title{font-family:var(--font-display);font-size:17px;margin:0 0 14px;}
.modal-actions{display:flex;gap:10px;margin-top:6px;}
.modal-actions .btn{flex:1;}

.fx-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;visibility:hidden;overflow:hidden;}
.fx-overlay.active{opacity:1;visibility:visible;}
.fx-flash{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%, rgba(255,255,255,0.9), rgba(124,92,255,0.25) 40%, transparent 70%);}
.fx-overlay.active .fx-flash{animation:flashIn 1.1s ease forwards;}
@keyframes flashIn{0%{opacity:0;}12%{opacity:1;}100%{opacity:0;}}
.fx-ring{position:absolute;border:2px solid rgba(164,139,255,0.7);border-radius:50%;width:60px;height:60px;}
.fx-overlay.active .fx-ring{animation:shockwave 1.4s ease-out forwards;}
@keyframes shockwave{0%{transform:scale(0.3);opacity:0.9;}100%{transform:scale(7);opacity:0;}}
.fx-content{position:relative;text-align:center;padding:0 30px;}
.fx-overlay.active .fx-content{animation:slamIn 0.6s cubic-bezier(.2,.8,.2,1) forwards;}
@keyframes slamIn{0%{transform:scale(1.5) translateY(8px);opacity:0;filter:blur(10px);}65%{transform:scale(0.97);opacity:1;filter:blur(0);}100%{transform:scale(1);}}
.fx-eyebrow{font-family:var(--font-system);font-size:12px;letter-spacing:4px;color:var(--arise-bright);text-transform:uppercase;margin-bottom:8px;}
.fx-title{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;text-shadow:0 0 30px rgba(164,139,255,0.8);}
.fx-sub{font-family:var(--font-system);font-size:13px;color:var(--bone);margin-top:8px;letter-spacing:0.5px;}

#toast-container{position:fixed;top:14px;left:0;right:0;z-index:70;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.toast{font-family:var(--font-system);font-size:12.5px;font-weight:700;letter-spacing:0.3px;background:rgba(20,20,36,0.92);border:1px solid var(--border-strong);border-radius:30px;padding:8px 16px;color:var(--bone);box-shadow:0 6px 20px rgba(0,0,0,0.4);animation:toastInOut 2.6s ease forwards;}
.toast.exp{color:var(--gold-soft);border-color:rgba(240,185,59,0.4);}
.toast.bad{color:#ffb4c1;border-color:rgba(255,71,104,0.4);}
.toast.ach{color:var(--cyan);border-color:rgba(45,212,244,0.4);}

<script>
let state = null; let saveTimer = null; let daoChart = null;

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function initCanvas() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    particles = [];
    for(let i=0; i<45; i++) {
        particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, size: Math.random()*1.5});
    }
}
function drawCanvas() {
    if(!state || state.settings?.showBackgroundAnim !== false) {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.strokeStyle = 'rgba(45, 212, 244, 0.15)';
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            for(let j=i+1; j<particles.length; j++) {
                let p2 = particles[j];
                let dist = Math.hypot(p.x-p2.x, p.y-p2.y);
                if(dist < 90) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
            }
        }
    } else {
        ctx.clearRect(0,0,canvas.width, canvas.height);
    }
    requestAnimationFrame(drawCanvas);
}
initCanvas(); drawCanvas(); window.addEventListener('resize', initCanvas);

function todayStr(){ return new Date().toLocaleDateString('en-CA'); }
function weekKey(d){ const date=new Date(d); const day=(date.getDay()+6)%7; date.setDate(date.getDate()-day); return date.toLocaleDateString('en-CA'); }
function monthKey(d){ return new Date(d).toLocaleDateString('en-CA').slice(0,7); }
function diffDays(a,b){ const A=new Date(a+'T00:00:00'), B=new Date(b+'T00:00:00'); return Math.round((B-A)/86400000); }
function formatRupiah(n){ return 'Rp'+Math.round(n).toLocaleString('id-ID'); }
function escapeHtml(str){ return str===undefined||str===null?'':String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(str){ return escapeHtml(str); }
function uid(prefix){ return (prefix||'id')+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }

const AudioEngine = {
  ctx: null,
  init() { 
      if(!this.ctx) { const AudioContext = window.AudioContext || window.webkitAudioContext; this.ctx = new AudioContext(); } 
      if(this.ctx.state === 'suspended') this.ctx.resume(); 
  },
  play(freqs, type, dur, vol = 0.05) {
    if(!state || state.settings?.soundEnabled===false) return;
    this.init();
    freqs.forEach((f, i) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(vol, this.ctx.currentTime + i*dur);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i*dur + dur);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(this.ctx.currentTime + i*dur); o.stop(this.ctx.currentTime + i*dur + dur);
    });
  }
};
const SFX = {
    click() { AudioEngine.play([600], 'sine', 0.05, 0.02); },
    success() { AudioEngine.play([400, 600, 800], 'sine', 0.1, 0.05); },
    questComplete() { AudioEngine.play([600, 800], 'sine', 0.1, 0.05); },
    victory() { AudioEngine.play([523.25, 659.25, 783.99, 1046.50], 'square', 0.15, 0.05); },
    levelUp() { AudioEngine.play([300, 400, 500, 600, 800], 'square', 0.15, 0.05); },
    error() { AudioEngine.play([200, 150], 'sawtooth', 0.15, 0.05); },
    coin() { AudioEngine.play([1200], 'sine', 0.1, 0.03); },
    breakthrough() { AudioEngine.play([50], 'sawtooth', 1.0, 0.1); setTimeout(() => AudioEngine.play([800, 1200], 'sine', 0.5, 0.05), 300); }
};

function createRipple(e) {
    const r = document.createElement('div'); r.className = 'click-ripple'; r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px'; r.style.width = '20px'; r.style.height = '20px';
    document.body.appendChild(r); setTimeout(() => r.remove(), 500);
}
document.addEventListener('click', (e) => {
   if(e.target.closest('button') || e.target.closest('.nav-btn') || e.target.closest('.kanban-card') || e.target.closest('.sip-panel') || e.target.closest('.chip') || e.target.closest('.check-item') || e.target.closest('select')) { SFX.click(); }
   createRipple(e);
});

const STORAGE_KEY = 'jian-ascension-state-vfinal-updated';

const URL_CLOUD = "https://script.google.com/macros/s/AKfycbzVch4awvs6cUov6Ky3jf4Jg7GBjrKPRYoFj8fxD4C8X-Mz93LFtRrmF9VhBHbASq5q-g/exec";

function simpanDataKeCloud() {
    if (!state || !state.character) return;
    
    showToast("Membuka portal ke Pusaka Awan...", "muted");
    
    const data = {
        username: state.character.name,
        level: state.character.level,
        exp: state.character.exp
    };

    fetch(URL_CLOUD, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(res => {
        if(res.status === 'success') {
            showToast("Pencapaian berhasil disegel di Cloud!", "ach");
            SFX.victory();
        } else {
            showToast("Gagal menyegel data.", "bad");
            SFX.error();
        }
    })
    .catch(error => {
        showToast("Portal tertutup! Periksa koneksi internet.", "bad");
        SFX.error();
    });
}

function muatDataDariCloud() {
    if (!state || !state.character) return;
    showToast("Memanggil ingatan dari Pusaka Awan...", "muted");
    
    fetch(URL_CLOUD + "?username=" + encodeURIComponent(state.character.name))
    .then(response => response.json())
    .then(res => {
        if(res.status === 'success') {
            state.character.level = parseInt(res.level) || 1;
            state.character.exp = parseInt(res.exp) || 0;
            
            recomputeLifeScore();
            save();
            render();
            
            showToast("Progres berhasil dipulihkan!", "ach");
            SFX.levelUp();
        } else {
            showToast("Catatan tidak ditemukan di Cloud.", "bad");
            SFX.error();
        }
    })

function realmStep(realmIndex){ const r = state.realms[realmIndex]; return r ? r.step : 1; }

function getDynamicRealmInfo(c) {
    const lvl = c.level || 1;
    if (lvl <= 15) {
        return {
            nameID: 'Qi Condensation ' + lvl,
            subName: '',
            stepInfo: { label: 'First Step', realmID: 'Mortal Realm', color: 'var(--muted)' },
            reqEnergyText: 'Naik level untuk menerobos'
        };
    } else if (lvl <= 19) {
        let sub = 'Awal';
        if(lvl === 17) sub = 'Menengah';
        if(lvl === 18) sub = 'Akhir';
        if(lvl === 19) sub = 'Puncak';
        return {
            nameID: 'Foundation Establishment',
            subName: sub,
            stepInfo: { label: 'First Step', realmID: 'Mortal Realm', color: 'var(--muted)' },
            reqEnergyText: 'Naik level untuk menerobos'
        };
    }
    
    let idx = Math.max(2, c.realmIndex || 0); 
    const r = state.realms[idx] || state.realms[state.realms.length-1];
    const nextR = state.realms[idx+1];
    let realmProg = c.realmEnergy / (nextR ? nextR.reqEnergy : 1);
    let subName = "Awal";
    if(realmProg >= 0.75) subName = "Puncak";
    else if(realmProg >= 0.50) subName = "Akhir";
    else if(realmProg >= 0.25) subName = "Tengah";

    return {
        nameID: r.nameID,
        subName: subName,
        stepInfo: realmStepInfo(r.step),
        reqEnergyText: nextR ? (nextR.reqEnergy - c.realmEnergy) + ' Energy ke ' + nextR.nameID : 'Realm Tertinggi'
    };
}

  if(!Array.isArray(s.todos)) s.todos = []; if(!s.sedekah) s.sedekah = { entries:[], totalLifetime:0, dailyExpGained:0, lastExpDate:'' };
  if(!s.weeklyShiftPlan) s.weeklyShiftPlan = DEFAULT_STATE().weeklyShiftPlan;
  if(!s.spiritual.dailyLog) s.spiritual.dailyLog = {};
  if(!s.customRituals) s.customRituals = [];
  if(!s.financeLog) { s.financeLog = s.boss.log || []; s.boss.log = []; } 
  if(!s.bossHistory) s.bossHistory = [];

  if(!s.settings) s.settings = DEFAULT_SETTINGS();
  const ds = DEFAULT_SETTINGS(); Object.keys(ds).forEach(k => { if(!(k in s.settings)) s.settings[k] = ds[k]; });
  if(s.settings.dailyExpCap < 9999999) s.settings.dailyExpCap = 9999999;
  return s;
}

function deepMerge(def, loaded){
  if(Array.isArray(def)) return loaded!==undefined ? loaded : def;
  if(def && typeof def==='object'){
    const out = {}; for(const k in def){ out[k] = deepMerge(def[k], loaded ? loaded[k] : undefined); }
    if(loaded){ for(const k in loaded){ if(!(k in out)) out[k]=loaded[k]; } } return out;
  }
  return loaded!==undefined ? loaded : def;
}

function expNeeded(level){ 
    return Math.round(100 * Math.pow(level, 1.7) + (level > 10 ? Math.pow(level - 10, 2) * 50 : 0)); 
}
function spiritualNeeded(level){ return Math.round(30 * Math.pow(level, 1.3)); }

function recomputeLifeScore(){
  if(!state) return; const c = state.character; const statSum = Object.values(state.stats).reduce((a,b)=>a+b,0);
  c.lifeScore = Math.max(0, (c.level-1)*10 + statSum*2 + c.streak*5 + c.realmIndex*50 + (state.spiritual.level-1)*8);
}

function gainExp(amount){
  const c = state.character; const mult = state.settings.expMultiplier || 1.0; amount = Math.round(amount * mult);
  if (amount > 0) {
      if (state.meta.dailyExpEarned >= state.settings.dailyExpCap) { showToast('Batas EXP harian (' + state.settings.dailyExpCap + ') telah tercapai!', 'muted'); return; }
      const allowedExp = Math.min(amount, state.settings.dailyExpCap - state.meta.dailyExpEarned);
      state.meta.dailyExpEarned += allowedExp; c.exp += allowedExp;
  } else {
      c.exp += amount;
      if (c.exp < 0) {
          let remainingNeg = Math.abs(c.exp); c.exp = 0;
          while(remainingNeg > 0 && c.level > 1) {
              c.level -= 1;
              const expN = expNeeded(c.level);
              if(remainingNeg > expN) { remainingNeg -= expN; }
              else { c.exp = expN - remainingNeg; remainingNeg = 0; }
              showToast(`LEVEL DOWN! Kini Lv.${c.level}`, 'bad'); SFX.error();
          }
      }
  }
  let leveled=false; while(c.level<1000 && c.exp >= expNeeded(c.level)){ c.exp -= expNeeded(c.level); c.level += 1; leveled=true; }
  if(leveled){ 
      SFX.levelUp(); showLevelUp(c.level); 
      if(c.level >= 20 && c.realmIndex < 2) {
          c.realmIndex = 2;
      }
  } 
  recomputeLifeScore();
}

function bumpStat(key, amount){ if(!(key in state.stats)) return; state.stats[key] = Math.max(0, (state.stats[key]||0) + amount); recomputeLifeScore(); }
function addRealmEnergy(amount){
  const c = state.character; c.realmEnergy = Math.max(0, c.realmEnergy + amount);
  if (isHeavenTrampling()) {
      const energyPerBridge = Math.floor(500000 / 9);
      while(c.realmEnergy >= energyPerBridge && c.heavenBridges < 9){
          c.realmEnergy -= energyPerBridge; c.heavenBridges++; addActivityLog(`Jembatan Surga ke-${c.heavenBridges} ditembus!`); showToast(`Jembatan ke-${c.heavenBridges} ditembus!`, 'ach'); SFX.levelUp();
          if(c.heavenBridges === 9){ addActivityLog('🌟 TA TIAN SEMPURNA'); showTrophy('TA TIAN SEMPURNA', 'Penguasa Kehampaan', '🌌'); }
      } return;
  }
  let nextIdx = c.realmIndex + 1;
  while(nextIdx < state.realms.length && c.realmEnergy >= state.realms[nextIdx].reqEnergy){
    c.realmIndex = nextIdx; SFX.breakthrough(); triggerBreakthrough(state.realms[nextIdx].nameID); nextIdx = c.realmIndex + 1;
  }
}

function rewardFor(q){
  const cfg = state.settings || DEFAULT_SETTINGS(); let base = (cfg.difficultyExp && cfg.difficultyExp[q.difficulty]) || DIFFICULTY_EXP[q.difficulty] || 25;
  if(q.type==='legendary') base = Math.max(base,150); if(q.type==='special') base = Math.round(base*1.3);
  const comboBonus = cfg.comboBonus ? 1 + Math.min(state.meta.completedTodayCount || 0, cfg.comboBonusCap) * cfg.comboBonusStep : 1;
  const streakBonus = cfg.streakBonus ? 1 + Math.min(state.character.streak, cfg.streakBonusCap) * cfg.streakBonusStep : 1;
  const realmBonus = cfg.realmBonus ? 1 + state.character.realmIndex * cfg.realmBonusStep : 1;
  return Math.max(1, Math.round(base * comboBonus * streakBonus * realmBonus));
}

function getRemainingCompletions(q){ if(!q.dailyLimit) return '∞'; return Math.max(0, q.dailyLimit - (q.completionsToday || 0)); }
function afterQuestComplete(q){ q.completionsToday = (q.completionsToday || 0) + 1; q.lastCompletedDate = todayStr(); }

function completeQuest(id){
  const q = state.quests.find(x=>x.id===id); if(!q || q.status==='done') return;
  if(!canCompleteQuestToday(q)) { showToast('Batas harian quest ini habis.', 'bad'); SFX.error(); return; }
  const exp = rewardFor(q); q.status='done'; q.lastCompletedAt = Date.now();
  state.meta.completedTodayCount = (state.meta.completedTodayCount||0)+1; state.character.totalQuests = (state.character.totalQuests||0)+1;

  (q.stats||[]).forEach(s=> bumpStat(s, Math.max(1,Math.round(exp/12))));
  state.character.hp = Math.min(state.character.maxHp, state.character.hp + 2);

function getTodayActiveShift() { const map = ['minggu','senin','selasa','rabu','kamis','jumat','sabtu']; const todayName = map[new Date().getDay()]; return state.weeklyShiftPlan[todayName] || 'libur'; }

function rollover(){
  const today = todayStr();
  if(!state.meta.lastActiveDate){ state.meta.lastActiveDate = today; state.meta.lastWeekKey = weekKey(new Date()); state.meta.lastMonthKey = monthKey(new Date()); return; }
  const activeShift = getTodayActiveShift(); if(activeShift !== 'libur' && activeShift !== 'custom') state.character.shift = activeShift;
  if(state.meta.lastActiveDate === today) return;

  const gap = Math.max(1, diffDays(state.meta.lastActiveDate, today));
  const dailyQuests = state.quests.filter(q=>q.type==='daily'); const coreQuests = dailyQuests.filter(q=>q.isCore);
  const checklist = coreQuests.length ? coreQuests : dailyQuests; const allDone = checklist.length>0 && checklist.every(q=>q.status==='done');

  if(gap >= 3) {
      setTimeout(() => {
          openConfirm(`⚠️ HUKUM ENTROPI BEKERJA! Kamu tidak membuka OS ini selama ${gap} hari. Kamu sedang ditarik ke dalam kekacauan dan kemunduran. Kerjakan tugasmu sekarang atau penyesalan yang menunggu di masa depan!`, () => {});
      }, 1000);
  }

  let missedCount = 0;
  dailyQuests.forEach(q => { if(q.status !== 'done' && q.status !== 'postponed') missedCount++; });
  if(missedCount > 0 && gap >= 1) {
      const penalty = missedCount * 50 * Math.max(1, state.character.level);
      gainExp(-penalty);
      state.character.failedQuests = (state.character.failedQuests||0) + missedCount;
      showToast(`Hukuman Disiplin: -${penalty} EXP (${missedCount} Quest terlewat)`, 'bad');
  }

  state.goals.forEach(g => {
      if(g.status === 'active' && g.deadline && g.deadline < today) {
          g.status = 'failed'; state.character.failedGoals = (state.character.failedGoals||0)+1;
          gainExp(-1000 * Math.max(1, state.character.level));
          showToast(`Goal Gagal (Deadline): ${g.title} - EXP Terkuras!`, 'bad');
      }
  });

  (state.kanban.cards || []).forEach(c => {
      if(c.col !== 'selesai' && c.dateTarget && c.dateTarget < today && !c.failed) {
          c.failed = true; state.character.failedProjects = (state.character.failedProjects||0)+1;
          gainExp(-500 * Math.max(1, state.character.level));
          showToast(`Project Overdue: ${c.title} - EXP Turun!`, 'bad');
      }
  });

  if(gap===1 && allDone){ state.character.streak += 1; state.character.failStreak = 0; if(state.character.recoveryMode) state.character.recoveryMode = false; } 
  else { state.character.streak = 0; state.character.failStreak += gap; if(state.character.failStreak>=3) state.character.recoveryMode = true; }
  state.character.longestStreak = Math.max(state.character.longestStreak, state.character.streak);

  (state.quests || []).forEach(q => { if(q.type==='daily') q.status='pending'; q.completionsToday = 0; });
  state.meta.completedTodayCount = 0; state.meta.dailyExpEarned = 0;
  if(state.sip) { state.sip.pagi.status = 'pending'; state.sip.siang.status = 'pending'; }
  if(!state.spiritual.dailyLog) state.spiritual.dailyLog = {}; state.spiritual.dailyLog[today] = {};

  const wk = weekKey(new Date()); if(wk !== state.meta.lastWeekKey){ state.quests.filter(q=>q.type==='weekly').forEach(q=>q.status='pending'); state.meta.lastWeekKey = wk; }
  const mk = monthKey(new Date()); if(mk !== state.meta.lastMonthKey){ state.quests.filter(q=>q.type==='monthly').forEach(q=>q.status='pending'); state.meta.lastMonthKey = mk; }
  state.meta.lastActiveDate = today; checkAchievements(); save();
}

function logSpiritual(key, isSuccess, isCustom = false){

  if(state.spiritual.dailyLog[today][key]) { showToast('Sudah dicatat hari ini!', 'bad'); SFX.error(); return; }

  state.spiritual.dailyLog[today][key] = isSuccess ? 'success' : 'fail';

  if(isSuccess) {

      while(state.spiritual.exp >= spiritualNeeded(state.spiritual.level)){ state.spiritual.exp -= spiritualNeeded(state.spiritual.level); state.spiritual.level += 1; leveled = true; }

  } else {

function submitGoalProgress(){
  const id = document.getElementById('ug-goal-id').value; const amount = parseFloat(document.getElementById('ug-amount').value);
  const g = state.goals.find(x=>x.id===id); if(!g || isNaN(amount) || amount===0) return;

function getCurrentTimeBlockInfo() {
    const shift = getTodayActiveShift() === 'libur' ? state.character.shift : getTodayActiveShift();
    const blocks = state.schedule[shift] || []; if (!blocks.length) return null;
    const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes();
    for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i]; if (!b.time) continue; const parts = b.time.split(/\s*[-–—]\s*/);
        if (parts.length === 2) {
            const [sh, sm] = parts[0].split(':').map(Number); const [eh, em] = parts[1].split(':').map(Number);
            if (isNaN(sh) || isNaN(eh)) continue; let startMins = sh * 60 + (sm || 0); let endMins = eh * 60 + (em || 0);
            if (endMins < startMins) { if (currentMins >= startMins || currentMins < endMins) return { current: b, next: blocks[(i + 1) % blocks.length] }; } 
            else { if (currentMins >= startMins && currentMins < endMins) return { current: b, next: blocks[(i + 1) % blocks.length] }; }
        }
    } return null;
}

function questCardHTML(q, compact){
  const tmeta = TYPE_META[q.type] || TYPE_META.custom; const exp = rewardFor(q);
  const statsHtml = (q.stats||[]).map(s=> statDef(s) ? `<span class="stat-chip">${statDef(s).label}</span>` : '').join('');
  let actions = ''; const remaining = getRemainingCompletions(q); const isDailyDone = q.dailyLimit && !canCompleteQuestToday(q);
  const badgeHTML = isDailyDone ? `<span class="pill" style="background:rgba(52,211,153,0.15);color:var(--jade);">✓ Selesai Hari Ini</span>` : (q.dailyLimit ? `<span class="pill" style="background:rgba(255,255,255,0.05);color:var(--muted);">Sisa: ${remaining}x</span>` : '');
  const btnDisabled = isDailyDone ? 'disabled' : '';

  if(q.status==='pending'){
    actions = `<button class="btn btn-primary btn-sm" ${btnDisabled} onclick="completeQuest('${q.id}')">✓ Selesai</button><button class="btn btn-ghost btn-sm" onclick="postponeQuest('${q.id}')">Tunda</button><button class="btn btn-danger btn-sm" onclick="failQuest('${q.id}')">Gagal</button>`;
  } else if(q.status==='done'){ actions = `<span class="pill" style="background:rgba(52,211,153,0.15);color:var(--jade);">✓ Selesai</span>`; } 
  else if(q.status==='failed'){ actions = `<button class="btn btn-ghost btn-sm" onclick="resetQuestStatus('${q.id}')">↺ Coba Lagi</button>`; } 
  else if(q.status==='postponed'){ actions = `<button class="btn btn-ghost btn-sm" onclick="resetQuestStatus('${q.id}')">↺ Aktifkan</button>`; }
  return `
  <div class="quest-card ${tmeta.cls} status-${q.status} ${q.type==='legendary'?'is-legendary':''}">
    <div class="quest-title-row">
      <div class="quest-title">${escapeHtml(q.title)}${q.isCore?'<div class="quest-core-tag">CORE HABIT</div>':''}</div>
      <div>
        <button class="icon-btn" onclick="openEditQuest('${q.id}')" title="Edit"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="icon-btn" onclick="deleteQuestConfirm('${q.id}')" title="Hapus"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg></button>
      </div>
    </div>
    <div class="quest-meta"><span class="pill" style="background:rgba(124,92,255,0.12);color:var(--arise-bright);">${tmeta.label}</span><span class="quest-reward">+${exp} EXP</span> ${badgeHTML}</div>
    ${statsHtml ? `<div class="quest-stats">${statsHtml}</div>` : ''} ${q.notes ? `<div class="quest-notes">${escapeHtml(q.notes)}</div>` : ''}
    <div class="quest-actions">${actions}</div>
  </div>`;
}

function initDaoChart() {
    const ctx = document.getElementById('daoChart'); if(!ctx) return; if(daoChart) daoChart.destroy();

    const labels = []; const data = []; for(let i=6; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); labels.push(d.toLocaleDateString('id-ID', {weekday:'short'})); data.push(dailyIncome[d.toLocaleDateString('en-CA')] || 0); }
    Chart.defaults.color = '#9492AC'; Chart.defaults.font.family = "'Rajdhani', sans-serif";
    daoChart = new Chart(ctx, { type: 'line', data: { labels: labels, datasets: [{ label: 'Pemasukan (Rp)', data: data, borderColor: '#F0B93B', backgroundColor: 'rgba(240, 185, 59, 0.15)', borderWidth: 2, tension: 0.4, fill: true, pointBackgroundColor: '#F0B93B', pointBorderColor: '#fff' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: function(value) { if(value >= 1000000) return (value / 1000000).toFixed(1) + 'M'; if(value >= 1000) return (value / 1000).toFixed(1) + 'K'; return value; }, font:{size:10} } }, x: { grid: { display: false } } }, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => formatRupiah(ctx.raw) } } } } });
}

function getProjectReward(card) {
    const start = card.dateStart || new Date(card.createdAt).toLocaleDateString('en-CA');
    const duration = Math.max(1, diffDays(start, todayStr()));
    if(duration <= 7) return 500 + (duration * 20); 
    if(duration <= 30) return 1500 + (duration * 30); 
    return 5000 + (duration * 50); 
}

function addProjectProgress(id) {
    const c = state.kanban.cards.find(x=>x.id===id); if(!c) return;
    c.progress = Math.min(100, c.progress + 10);
    gainExp(10); 
    if(c.progress === 100 && c.col !== 'selesai') {
        c.col = 'selesai';
        const expGain = getProjectReward(c);
        gainExp(expGain);
        showToast('Project Selesai! +'+expGain+' EXP', 'ach');
        SFX.victory();
    } else {
        SFX.click();
    }
    render(); save();
}

let draggedKanbanId = null;

function kDragEnd(e) { e.target.classList.remove('dragging'); }
function kDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function kDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function kDrop(e, colId) { 
    e.preventDefault(); e.currentTarget.classList.remove('drag-over'); const id = e.dataTransfer.getData('text/plain') || draggedKanbanId; if(!id) return; 
    const card = state.kanban.cards.find(c => c.id === id); 
    if(card && card.col !== colId) { 
        card.col = colId; addActivityLog(`Materi Pindah: ${card.title} ke ${colId}`); save(); render(); if(navigator.vibrate) navigator.vibrate(50); 
        if(colId === 'selesai') { 
            const expGain = getProjectReward(card);
            showToast(`Materi Selesai! Insight Bertambah (+${expGain} EXP)`, 'ach');

            SFX.victory();
        } 
    } 
}

function calcHabitRateWeek(daysAgoStart, daysAgoEnd = 0) {
   if(!state.habits || state.habits.length === 0) return 0; let possible = 0; let done = 0;
   for(let i = daysAgoStart - 1; i >= daysAgoEnd; i--) { let d = new Date(); d.setDate(d.getDate() - i); let dStr = d.toLocaleDateString('en-CA'); state.habits.forEach(h => { possible++; if(h.log && h.log[dStr]) done++; }); }
   return possible === 0 ? 0 : Math.round((done/possible)*100);
}
function renderStatisticsTable() {
    let weeklyActivity = 0; let lastWeeklyActivity = 0; let weeklyIncome = 0; let lastWeeklyIncome = 0;
    const today = new Date(); const weekAgo = new Date(today - 7*86400000); const twoWeeksAgo = new Date(today - 14*86400000);
    const cutOffStr = weekAgo.toLocaleDateString('en-CA'); const twoWeeksAgoStr = twoWeeksAgo.toLocaleDateString('en-CA');
    for (const [date, count] of Object.entries(state.meta.activityLog || {})) { if(date >= cutOffStr) weeklyActivity += count; else if(date >= twoWeeksAgoStr) lastWeeklyActivity += count; }
    (state.financeLog||[]).forEach(l => { if(l.date >= cutOffStr) weeklyIncome += l.amount; else if(l.date >= twoWeeksAgoStr) lastWeeklyIncome += l.amount; });
    const sedekahThisWeek = (state.sedekah?.entries||[]).filter(e=>e.date>=cutOffStr).reduce((s,e)=>s+(e.nominal||0),0); const sedekahLastWeek = (state.sedekah?.entries||[]).filter(e=>e.date>=twoWeeksAgoStr && e.date<cutOffStr).reduce((s,e)=>s+(e.nominal||0),0);
    const habitRate = calcHabitRateWeek(7); const habitRateLast = calcHabitRateWeek(14, 7);
    function delta(a, b){ if(a > b) return '<span style="color:var(--jade)">▲</span>'; if(a < b) return '<span style="color:var(--crimson)">▼</span>'; return '<span style="color:var(--muted)">—</span>'; }
    let tbl1 = `<div class="section-title">📊 Ringkasan Mingguan</div><div class="card glass-panel" style="padding:0; overflow-x:auto;"><table class="stats-table"><thead><tr><th>Metrik</th><th>Minggu Ini</th><th>Minggu Lalu</th><th></th></tr></thead><tbody><tr><td>Aktivitas Total</td><td style="color:var(--cyan); font-weight:700;">${weeklyActivity}</td><td>${lastWeeklyActivity}</td><td>${delta(weeklyActivity,lastWeeklyActivity)}</td></tr><tr><td>Pemasukan Finansial</td><td style="color:var(--gold); font-weight:700;">${formatRupiah(weeklyIncome)}</td><td>${formatRupiah(lastWeeklyIncome)}</td><td>${delta(weeklyIncome,lastWeeklyIncome)}</td></tr><tr><td>Sedekah / Amal</td><td style="color:var(--arise-bright); font-weight:700;">${formatRupiah(sedekahThisWeek)}</td><td>${formatRupiah(sedekahLastWeek)}</td><td>${delta(sedekahThisWeek,sedekahLastWeek)}</td></tr><tr><td>Habit Rate (%)</td><td style="font-weight:700;">${habitRate}%</td><td>${habitRateLast}%</td><td>${delta(habitRate,habitRateLast)}</td></tr></tbody></table></div>`;
    const statKeys = allStatKeys(); const sortedStats = statKeys.map(k => ({ k, def: statDef(k), val: state.stats[k] || 0 })).sort((a,b) => b.val - a.val);
    const tbl2Rows = sortedStats.map(s => `<tr><td style="font-weight:600; color:var(--bone);">${s.def.label}</td><td style="color:var(--muted);">${s.def.group}</td><td style="color:${s.def.color||'var(--bone)'}; font-weight:700;">${s.val}</td></tr>`).join('');
    return tbl1 + `<div class="section-title">⚔️ Character Stats (Ranked)</div><div class="card glass-panel" style="padding:0; overflow-x:auto;"><table class="stats-table"><thead><tr><th>Stat / Atribut</th><th>Grup</th><th>Nilai</th></tr></thead><tbody>${tbl2Rows}</tbody></table></div>`;
}

  <div id="settings-slot">${renderSettingsModal()}</div>
  <div class="modal-overlay" id="modal-add-quest"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title" id="modal-add-quest-title">Tambah Quest</div><div class="field"><label>Judul Quest</label><input type="text" id="aq-title" placeholder="Contoh: Latihan 10 menit" class="input"></div><div class="field"><label>Tipe Quest</label><select id="aq-type" class="input"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="special">Special</option><option value="legendary">Legendary</option><option value="custom">Custom</option></select></div><div class="field"><label>Tingkat Kesulitan</label><select id="aq-difficulty" class="input"><option value="easy">Easy (+10 EXP)</option><option value="normal" selected>Normal (+25 EXP)</option><option value="hard">Hard (+50 EXP)</option><option value="epic">Epic (+120 EXP)</option></select></div><div class="field"><label>Stat Reward (maks. 2)</label><div class="check-grid">${allStatKeys().map(k=>`<label class="check-item"><input type="checkbox" class="aq-stat" value="${k}" onchange="limitStatChecks(this)"> ${statDef(k).label}</label>`).join('')}</div></div><div class="field"><label class="checkbox-row" style="margin-bottom:0;"><input type="checkbox" id="aq-core"> Tandai sebagai Core Habit</label></div><div class="field"><label>Catatan (opsional)</label><textarea id="aq-notes" placeholder="Detail tambahan..." class="input"></textarea></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-add-quest')">Batal</button><button class="btn btn-primary" onclick="addQuest()">Simpan</button></div></div></div>
  <div class="modal-overlay" id="modal-kanban-edit"><div class="modal-sheet"><div class="modal-handle"></div><h2 class="modal-title" id="modal-card-title">Detail Materi</h2><input type="hidden" id="km-id"><input type="hidden" id="km-col"><div class="field"><label>Judul Materi</label><input type="text" id="km-title" placeholder="Nama buku, course, dll" class="input"></div><div class="field"><label>Tipe</label><select id="km-type" class="input"><option value="Buku">📖 Buku</option><option value="Course">🎓 Course</option><option value="Video">🎬 Video</option><option value="Artikel">📄 Artikel</option><option value="Lainnya">📦 Lainnya</option></select></div><div class="form-row"><div class="form-group half"><label>Tgl Mulai</label><input type="date" id="km-dateStart" class="input"></div><div class="form-group half"><label>Target Selesai</label><input type="date" id="km-dateTarget" class="input"></div></div><div class="field"><label>Progress: <span id="card-prog-val">0</span>%</label><input type="range" id="km-progress" min="0" max="100" value="0" style="width:100%; accent-color:var(--cyan);" oninput="document.getElementById('card-prog-val').textContent=this.value"></div><div class="field"><label>Kolom</label><select id="card-modal-col" class="input"><option value="mau_dipelajari">📚 Mau Dipelajari</option><option value="sedang_dipelajari">🔥 Sedang Dipelajari</option><option value="direview">🔍 Direview</option><option value="selesai">✅ Selesai</option></select></div><div class="field"><label>Insight / Catatan</label><textarea id="km-notes" placeholder="Tulis hal penting di sini..." class="input"></textarea></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-kanban-edit')">Batal</button><button class="btn btn-danger" onclick="deleteCardFromModal()">Hapus Item</button><button class="btn btn-primary" onclick="submitCardModal()">Simpan</button></div></div></div>
  <div class="modal-overlay" id="modal-add-todo"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Tambah To-Do Cepat</div><div class="field"><label>Tugas</label><input type="text" id="at-title" placeholder="Contoh: Balas chat" class="input"></div><div class="field"><label>Prioritas Matriks</label><select id="at-priority" class="input"><option value="penting">🔴 Penting (Goals/Core)</option><option value="tidak_penting">🔵 Tidak Penting (Trivial)</option></select></div><div class="field"><label class="checkbox-row" style="margin-bottom:0;"><input type="checkbox" id="at-urgent" checked> Urgent (Hari Ini)</label></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-add-todo')">Batal</button><button class="btn btn-primary" onclick="addToDo()">Simpan</button></div></div></div>
  <div class="modal-overlay" id="modal-log-income"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Catat Transaksi Finansial</div>
    <div class="field"><label>Jenis Transaksi</label><select id="bi-type" class="input"><option value="in">Pemasukan (+)</option><option value="out">Pengeluaran (-)</option></select></div>
    <div class="field"><label>Jumlah (Rp)</label><input type="number" id="bi-amount" placeholder="100000" inputmode="numeric" class="input"></div><div class="field"><label>Catatan (opsional)</label><input type="text" id="bi-note" placeholder="Hasil proyek, target tercapai, dll" class="input"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-log-income')">Batal</button><button class="btn btn-primary" onclick="addFinanceTransaction()">Catat</button></div></div></div>
  <div class="modal-overlay" id="modal-update-boss"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Progress Target Custom</div><div class="field"><label>Jumlah Progress (Rp/Poin)</label><input type="number" id="bt-amount" placeholder="10000" inputmode="numeric" class="input"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-update-boss')">Batal</button><button class="btn btn-primary" onclick="updateBossTarget()">Proses</button></div></div></div>
  <div class="modal-overlay" id="modal-new-boss"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Edit / Set Target Finansial Spesifik Baru</div><div class="field"><label>Nama Target</label><input type="text" id="nb-name" placeholder="Target Dana Darurat" class="input" value="${state.boss.name}"></div><div class="field"><label>Goal Angka/Nominal (Rp/Poin)</label><input type="number" id="nb-maxhp" placeholder="10000000" inputmode="numeric" class="input" value="${state.boss.maxHp}"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-new-boss')">Batal</button><button class="btn btn-gold" onclick="setNewBoss()">Tetapkan Target</button></div></div></div>
  <div class="modal-overlay" id="modal-confirm"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Konfirmasi</div><div class="small" id="confirm-message" style="line-height:1.5;color:var(--bone);"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-confirm')">Batal</button><button class="btn btn-danger" onclick="runConfirm()">Ya, Lanjutkan</button></div></div></div>
  <div class="modal-overlay" id="modal-add-goal"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title" id="modal-add-goal-title">Tambah Goal</div><div class="field"><label>Nama Goal</label><input type="text" id="ag-title" placeholder="Contoh: Turun berat badan" class="input"></div><div class="field"><label>Target</label><input type="number" id="ag-target" placeholder="Biarkan kosong jika dari hari deadline" class="input"></div><div class="field"><label>Satuan (Opsional)</label><input type="text" id="ag-unit" placeholder="kg, hari, dll" class="input"></div><div class="field"><label>Deadline (opsional)</label><input type="date" id="ag-deadline" class="input"></div><div class="field"><label>Catatan (opsional)</label><textarea id="ag-notes" placeholder="Detail tambahan..." class="input"></textarea></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-add-goal')">Batal</button><button class="btn btn-primary" onclick="addGoal()">Simpan Goal</button></div></div></div>
  <div class="modal-overlay" id="modal-update-goal"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Update Progress Goal</div><input type="hidden" id="ug-goal-id"><div class="field"><label>Tambah progress (boleh negatif)</label><input type="number" id="ug-amount" placeholder="1" class="input"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-update-goal')">Batal</button><button class="btn btn-primary" onclick="submitGoalProgress()">Simpan</button></div></div></div>
  <div class="modal-overlay" id="modal-add-stat"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Tambah Stat Kustom</div><div class="field"><label>Nama Stat</label><input type="text" id="as-label" placeholder="Contoh: Kreativitas" class="input"></div><div class="field"><label>Kategori</label><select id="as-group" class="input"><option value="Body">💪 Body</option><option value="Mind">🧠 Mind</option><option value="Social">💬 Social</option><option value="Soul">🌌 Soul</option><option value="Finansial">💰 Finansial</option><option value="Custom" selected>✨ Custom</option></select></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-add-stat')">Batal</button><button class="btn btn-primary" onclick="addCustomStat()">Tambah</button></div></div></div>
  <div class="modal-overlay" id="modal-add-habit"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Tambah Habit Baru</div><div class="field"><label>Nama Habit</label><input type="text" id="ah-title" placeholder="Contoh: Minum air 2 Liter" class="input"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-add-habit')">Batal</button><button class="btn btn-primary" onclick="addHabit()">Simpan Habit</button></div></div></div>
  <div class="modal-overlay" id="modal-sip-pagi"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">SIP PAGI</div><div class="small muted mb-14">Checklist Persiapan Pagi</div>${DEFAULT_STATE().sip.config.pagi.map((t,i)=>`<div class="field"><label style="display:flex; gap:8px;"><input type="checkbox" id="sp${i}"> ${t}</label></div>`).join('')}<div class="modal-actions mt-14"><button class="btn btn-ghost" onclick="closeModal('modal-sip-pagi')">Tutup</button><button class="btn btn-primary" onclick="submitSIPPagi()">Selesai Pagi (+30 EXP)</button></div></div></div>
  <div class="modal-overlay" id="modal-sip-siang"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">SIP SIANG</div><div class="small muted mb-14">Evaluasi Tengah Hari</div>${DEFAULT_STATE().sip.config.siang.map((t,i)=>`<div class="field"><label style="display:flex; gap:8px;"><input type="checkbox" id="ss${i}"> ${t}</label></div>`).join('')}<div class="field mt-14"><label>Persentase Selesai Hari Ini (%)</label><input type="number" id="sip-siang-prog" placeholder="65" class="input"></div><div class="modal-actions mt-14"><button class="btn btn-ghost" onclick="closeModal('modal-sip-siang')">Tutup</button><button class="btn btn-primary" onclick="submitSIPSiang()">Selesai Siang (+30 EXP)</button></div></div></div>
  `;
}
function limitStatChecks(el){ const checked = document.querySelectorAll('.aq-stat:checked'); if(checked.length>2){ el.checked=false; } }
function openModal(id){ const el = document.getElementById(id); if(el) { el.classList.add('open'); SFX.click(); } }
function closeModal(id){ const el = document.getElementById(id); if(el) el.classList.remove('open'); SFX.click(); }
function openConfirm(message, cb){ document.getElementById('confirm-message').textContent = message; confirmCallback = cb; openModal('modal-confirm'); }
function runConfirm(){ closeModal('modal-confirm'); if(confirmCallback){ confirmCallback(); confirmCallback=null; } }

function submitSIPPagi() { const items = state.sip.config.pagi; state.sip.pagi.status = 'done'; state.sip.pagi.checkedCount = items.filter((_, i) => document.getElementById('sp'+i)?.checked).length; gainExp(30); bumpStat('discipline', 2); addActivityLog('SIP Pagi'); if(state.settings.showFloatingExp) showToast('+30 EXP', 'exp'); closeModal('modal-sip-pagi'); showToast('SIP Pagi Selesai. Semangat!', 'ach'); SFX.questComplete(); render(); save(); }
function submitSIPSiang() { const items = state.sip.config.siang; state.sip.siang.status = 'done'; state.sip.siang.progress = Math.max(0, Math.min(100, parseInt(document.getElementById('sip-siang-prog').value, 10) || 0)); state.sip.siang.checkedCount = items.filter((_, i) => document.getElementById('ss'+i)?.checked).length; gainExp(30); bumpStat('focus', 2); addActivityLog('SIP Siang'); if(state.settings.showFloatingExp) showToast('+30 EXP', 'exp'); closeModal('modal-sip-siang'); showToast('SIP Siang Selesai. Tetap fokus!', 'ach'); SFX.questComplete(); render(); save(); }
function showFloatingExp(amount){ showToast((amount>=0?'+':'')+amount+' EXP', 'exp'); }
function showToast(text, type){ const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = 'toast'+(type?' '+type:''); t.textContent = text; c.appendChild(t); setTimeout(()=>t.remove(), 2700); }
function showLevelUp(level){ const el = document.getElementById('fx-levelup'); document.getElementById('fx-levelup-title').textContent = 'Lv. '+level; el.classList.add('active'); setTimeout(()=>el.classList.remove('active'), 1500); }
function triggerBreakthrough(realmName){ const el = document.getElementById('fx-breakthrough'); document.getElementById('fx-breakthrough-title').textContent = realmName; el.classList.add('active'); setTimeout(()=>el.classList.remove('active'), 2600); }
function triggerBossDefeat(name){ state.character.bossesDefeated = (state.character.bossesDefeated||0)+1; const el = document.getElementById('fx-boss'); document.getElementById('fx-boss-title').textContent = name; el.classList.add('active'); setTimeout(()=>el.classList.remove('active'), 2600); }
function showTrophy(title, subtitle, icon) { document.getElementById('fx-boss-title').textContent = title; document.querySelector('#fx-boss .fx-sub').textContent = subtitle; const el = document.getElementById('fx-boss'); el.classList.add('active'); SFX.levelUp(); setTimeout(()=>el.classList.remove('active'), 3500); }

function init(){
  let loaded = loadState(); 
  state = loaded ? migrateState(deepMerge(DEFAULT_STATE(), loaded)) : DEFAULT_STATE();
  rollover(); recomputeLifeScore(); buildModals(); render(); 
  setInterval(updateTimeBlockUI, 30000); 
}
window.onload = function() { init(); };
</script>
</body>
</html>
